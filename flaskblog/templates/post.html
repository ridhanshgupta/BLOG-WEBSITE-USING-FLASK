{% extends "base.html" %}

<!-- {% block title %}Home - Flask Blog{% endblock %} -->

{% block content %}
<div class="container mt-4">
  <div class="row">
    <div class="col-md-8">
      {% for post in posts %}{% for post in posts %}
      <article class="media content-section p-3 mb-4 border rounded shadow-sm">
        <div class="d-flex">
          <!-- Profile image left -->
          <img
            class="rounded-circle article-img me-3"
            src="{{ url_for('static', filename='profile_pics/' + post.author.image_file) }}"
            alt="Profile"
          />

          <!-- Post content right -->
          <div class="media-body w-100">
            <!-- Username + Date -->
            <div class="article-metadata border-bottom pb-1 mb-2">
              <a class="me-2 text-decoration-none fw-bold" href="#">
                {{ post.author.username }}
              </a>

              <small class="text-muted">
                {{ post.date_posted.strftime('%Y-%m-%d') }}
              </small>
            </div>

            <!-- Title -->
            <h2>
              <a class="article-title text-dark text-decoration-none" href="#">
                {{ post.title }}
              </a>
            </h2>

            <!-- Content -->
            <p class="article-content">{{ post.content }}</p>
          </div>
        </div>
      </article>
      {% endfor %} {% endfor %}
    </div>

    
  </div>
</div>
{% endblock %}
